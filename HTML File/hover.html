 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      *{
         margin: 0;
      }
      body{
         display: flex;
         justify-content: center;
         height: 100vh;
         align-items: center;
         gap: 3px;
      }
      .box{
         height: 150px;
         width: 100px;
         background-color:rgb(252, 253, 253);
         border: 1px solid rgb(230, 232, 236);
         transform: skew(-30deg);
         border-radius: 10px;
      }
      .box:hover{
         background-color: rgb(106, 238, 155);
         scale: 1.1;
      }
      .box:not(:hover){
         transition: all ease-in-out 600ms;
      }
    </style>
 </head>
 <body>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
 </body>
 </html>
