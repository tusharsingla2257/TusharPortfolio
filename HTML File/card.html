<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
        }
         .card{
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            overflow: hidden;   
         }
         .Shoe{
            overflow:hidden;
            border-radius: 12px ;
         }
         .Shoe-img{
            height: 300px;
            width: 440px;
         }
         .Text{
            margin-top: 20px ;
            margin-left: 30px;
            font-weight: 550;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 18px
         }
         .Sub-text{
            font-family:Arial, Helvetica, sans-serif;
            margin-top: 12px;
            margin-left: 30px;
            font-size: 15px;
            color: rgb(108, 121, 121);
         }
         .Price{
            margin: 18px 30px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
         }
         .Add{
            font-size: 30px;
            color: rgb(63, 122, 204);
         }
    </style>
</head>
<body>
    <div class="card">
        <div class="Shoe">
            <img src="https://images.unsplash.com/photo-1552066344-2464c1135c32?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" 
            alt="Shoe"
            class="Shoe-img">
            <div class="Text">
                Air Jordan
                </div>
                  <div class="Sub-text">
                    Best Shoes for You.
                </div>
                <div class="Price">
                    <b>$299.99</b>
                    <div class="Add" style="font-weight: 300;"><b>+</b></div>
            </div>
        </div>
    </div>
</body>
</html>
