<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
        }

        body {
            background-color: #d2e823;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            height: 59.6px;
            /* width: 1382.4px; */

            background-color: white;
            border-radius: 80px;
            align-items: center;
            margin: 55px;
            padding: 13px 13px 13px 44px;
            position: sticky;
        }

        .logo {
            height: 28px;
            width: 118px;
        }

        .log-signin {
            display: flex;
            gap: 8px;
        }

        .btn {
            height: 62px;
            width: 101px;
            border: transparent;
            border-radius: 8px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: medium;
        }

        .sign-btn {
            height: 62px;
            width: 152.07px;
            border: transparent;
            border-radius: 50px;
            font-size: medium;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1e2330;
            color: white;
        }

        .component {
            color: black;
            display: flex;
            margin-right: 500px;
            margin-left: 50px;
            gap: 30px;
            font-size: medium;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="navbar">
            <div class="logo">
                <img src="linktree.svg" alt="">
            </div>

            <!-- components -->
            <div class="component">
                <div class="Products">Products</div>
                <div class="Templates">Templates</div>
                <div class="Marketplace">Marketplace</div>
                <div class="Learn">Learn</div>
                <div class="Pricing">Pricing</div>
            </div>


            <div class="log-signin">
                <div class="login">
                    <button class="btn">Log in</button>
                </div class="sign-in">
                <button class="sign-btn">Sign up free</button>
            </div>
        </div>
    </div>

    <div class="body-text">

    </div>
</body>

</html>
