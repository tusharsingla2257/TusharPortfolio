header{

    height:300px;

    overflow:hidden;

    width:100%;

.img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s ease;
}

/* Overlay */

.boxes{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;

    display:grid;
    grid-template-columns:repeat(22, 50px);
    grid-template-rows: repeat(6,50px);

    opacity:0;
    transition:0.4s ease;
}

/* Boxes */
.box{
    width:50px;
    height:50px;
    background:transparent;
    border:1px dashed white;
    /* border-radius:10px; */
}

/* Hover Effects */
header:hover .img{
    filter:blur(5px);
    transform:scale(1.05);
}

header:hover .boxes{
    opacity:1;
}
</style>
