<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jelly Grid Effect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#111;
}

header{
    position:relative;
    width:1100px;
    height:300px;
    overflow:hidden;
}

.image{
    width:100%;
    height:100%;
}

.img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.5s ease;
}

/* Blur Image */
header:hover .img{
    filter:blur(5px);
    transform:scale(1.05);
}

/* Overlay Grid */
.boxes{
    position:absolute;
    inset:0;

    display:grid;
    grid-template-columns:repeat(22,50px);
    grid-template-rows:repeat(6,50px);

    opacity:0;
    transition:.4s ease;
}

header:hover .boxes{
    opacity:1;
}

/* Individual Boxes */
.box{
    width:50px;
    height:50px;
    border:1px dashed white;
    background:transparent;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}

/* Jelly Animation */
.box:hover{
    animation:jelly .45s;
}

@keyframes jelly{

    0%{
        transform:scale(1);
    }

    35%{
        transform:scale(1.45);
    }

    60%{
        transform:scale(.85);
    }

    80%{
        transform:scale(1.15);
    }

    100%{
        transform:scale(1);
    }

}
</style>
</head>

<body>

<header>

    <div class="image">
        <img src="mountain.jpg" class="img">
    </div>

    <div class="boxes"></div>

</header>

<script>
let boxes = document.querySelector(".boxes");

// 22 columns × 6 rows = 132 boxes
for(let i = 0; i < 132; i++){

    let box = document.createElement("div");
    box.className = "box";

    boxes.appendChild(box);

}
</script>

</body>
</html>
