<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: rgb(255, 82, 0);
            height: 100vh;
            overflow: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
            width: 1216px;
            margin-left: 150px;
        }

        .logo {
            height: 48px;
            width: 160px;
            display: flex;

        }

        .text {
            display: flex;
            gap: 25px;
            color: white;
            align-items: center;
            margin-left: 430px;
            font-weight: 600;
            font-size: 14px;
        }

        .text-1 {
            height: 21px;
            width: 128px;
            color: white;
        }

        .gettheapp {
            color: white;
            height: 36px;
            width: 120.66px;
            padding: 8px 12px;
            border: 1px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-size: 16px;
        }

        .sign-in {
            height: 54px;
            width: 135px;
            background-color: black;
            color: white;
            border: transparent;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn {
            display: flex;
            gap: 35px;
        }

        .body-content {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 117px;
        }

        .img-1 {
            height: 300px;
            width: 250px;
        }

        .body-text {
            text-align: center;
            color: white;
            font-size: 22px;
            margin-top: 80px;
        }

        .img-2 {
            height: 300px;
            width: 250px;
            /* margin-left: 15px; */
        }

        main {
            display: flex;
            justify-content: space-between;
        }

        .location {
            color: rgb(170, 169, 169);
            height: 58px;
            width: 308px;
            background-color: white;
            border-radius: 15px;
            border: transparent;
            font-size: medium;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .searchbox {
            display: flex;
            gap: 18px;
            margin-top: 30px;
        }

        .search-box {
            color: rgb(170, 169, 169);
            height: 42px;
            width: 460px;
            background-color: white;
            border-radius: 15px;
            border: transparent;
            font-size: medium;
            display: flex;
            /* justify-content: center; */
            align-items: center;
            padding: 8px;
        }

        .cards{
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            margin-inline: 200px;
        }
        .card {
            border: transparent;
            border-radius: 10px;
            height: 350px;
            width: 380px;    
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">
            <img alt="" class="" height="100%" loading="lazy" width="100%"
                src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/portal/static-assets/images/swiggy_logo_white.png">
        </div>
        <div class="text">
            <div class="text-1">
                Swiggy Corporate
            </div>
            <div class="text-2">
                Partner with us
            </div>
        </div>
        <div class="btn">
            <div class="gettheapp">
                <b>Get the App</b>
            </div>
            <div class="sign-in">
                <b>Sign in</b>
            </div>
        </div>
    </nav>

    <main>
        <div class="body-content">
            <div class="img-1">
                <img class="img-1"
                    src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/portal/testing/seo-home/Veggies_new.png"
                    alt="left_img">
            </div>

            <div class="bodytext">
                <div class="body-text">
                    <h1>
                        Order food & groceries. Discover <br>
                        best restaurants. Swiggy it!
                    </h1>

                    <div class="searchbox">
                        <div class="location">
                            <b>Enter your delivery location</b>
                        </div>

                        <div class="search-box">
                            <b>Search for restaurant, item or more</b>
                        </div>
                    </div>
                </div>
            </div>

            <div class="img-2">
                <img class="img-2"
                    src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/portal/testing/seo-home/Sushi_replace.png"
                    alt="right_img">
            </div>
        </div>
    </main>

    <div class="cards">
        <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/MERCHANDISING_BANNERS/IMAGES/MERCH/2024/7/23/ec86a309-9b06-48e2-9adc-35753f06bc0a_Food3BU.png"
            alt="Food" class="card" draggable="false">
        <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/MERCHANDISING_BANNERS/IMAGES/MERCH/2024/7/23/ec86a309-9b06-48e2-9adc-35753f06bc0a_Food3BU.png"
            alt="Food" class="card">
        <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/MERCHANDISING_BANNERS/IMAGES/MERCH/2024/7/23/ec86a309-9b06-48e2-9adc-35753f06bc0a_Food3BU.png"
            alt="Food" class="card">
    </div>
</body>

</html>
