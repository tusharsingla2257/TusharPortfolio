<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(212, 238, 229);
            height: 100vh;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 60px;
            font-size: 22px;
            padding: 20px;
        }

        nav a {
            text-decoration: none;
            color: black;
        }

        .text {
            text-align: center;
            font-size: 25px;
            margin-top: 40px;
        }

        .sub-text {
            color: rgb(49, 45, 45);
            margin-top: 10px;
        }

        .hover-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 60px;
        }

        .box {
            height: 150px;
            width: 100px;
            background-color: rgb(212, 238, 229);
            border: 1px solid rgb(230, 232, 236);
            border-radius: 10px;
            transform: skew(-30deg);

            animation: wave 2s infinite ease-in-out;
        }

        @keyframes wave {

            from {
                transform: skew(-30deg) translateY(0) scale(1);
                background-color: rgb(212, 238, 229);
            }

            50% {
                transform: skew(-30deg) translateY(-30px) scale(1.1);
                background-color: rgb(106, 238, 155);
            }
        }

        .box:nth-child(1) {
            animation-delay: 0s;
        }

        .box:nth-child(2) {
            animation-delay: 0.2s;
        }

        .box:nth-child(3) {
            animation-delay: 0.4s;
        }

        .box:nth-child(4) {
            animation-delay: 0.6s;
        }

        .box:nth-child(5) {
            animation-delay: 0.8s;
        }

        .box:nth-child(6) {
            animation-delay: 1s;
        }
    </style>
</head>

<body>

    <nav>
        <a href="">Home</a>
        <a href="">Work</a>
        <a href="">Contact Us</a>
    </nav>

    <div class="body-content">
        <div class="text">
            <h1>
                Design Engineer optimising the <br>
                Product Life Cycle and reducing
            </h1>

            <div class="sub-text">
                Passionate about bridging the gap between
                innovative mechanical design and
                cost-effective production.
            </div>
        </div>

        <div class="hover-box">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>

</body>

</html>
