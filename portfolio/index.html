    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(212, 238, 229);
            height: 100vh;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 60px;
            font-size: 22px;
            padding: 20px;
        }

        nav a {
            text-decoration: none;
            color: black;
        }

        .text {
            text-align: center;
            font-size: 25px;
            margin-top: 40px;
        }

        .sub-text {
            color: rgb(49, 45, 45);
            margin-top: 10px;
        }

        /* Hover Box  */
        .hover-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 60px;
        }

        .box {
            height: 150px;
            width: 100px;
            background-color: rgb(212, 238, 229);
            border: 1px solid rgb(230, 232, 236);
            border-radius: 10px;
            transform: skew(-30deg);

            animation: autohover 2s infinite;
        }

        @keyframes autohover {
            from {
                transform: skew(-30deg) scale(1);
                background-color: rgb(212, 238, 229);
            }

            50% {
                transform: skew(-30deg) scale(1.1);
                background-color: rgb(106, 238, 155);
            }
        }

        .box:nth-child(1) {
            animation-delay: 0s;
        }

        .box:nth-child(2) {
            animation-delay: 0.2s;
        }

        .box:nth-child(3) {
            animation-delay: 0.4s;
        }

        .box:nth-child(4) {
            animation-delay: 0.6s;
        }

        .box:nth-child(5) {
            animation-delay: 0.8s;
        }

        .box:nth-child(6) {
            animation-delay: 1s;
        }

        /* Companies I have Worked With */
        .carousel-3D {
            display: flex;
            justify-content: center;
            margin-top: 40px;
            position: absolute;
            height: 100%;
            width: 100%;
            transform-style: preserve-3d;
            animation: rotation 10s infinite linear;
        }

        @keyframes rotation {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg)
            }
        }

        .entity {
            height: 45px;
            width: 45px;
            border-radius: 75px;
            border: transparent;
            display: block;
            position: absolute;
        }

        .entity:nth-child(1) {
            transform: rotateY(0deg) translateZ(350px);
        }

        .entity:nth-child(2) {
            transform: rotateY(36deg) translateZ(350px);
        }

        .entity:nth-child(3) {
            transform: rotateY(72deg) translateZ(350px);
        }

        .entity:nth-child(4) {
            transform: rotateY(108deg) translateZ(350px);
        }

        .entity:nth-child(5) {
            transform: rotateY(144deg) translateZ(350px);
        }

        .entity:nth-child(6) {
            transform: rotateY(180deg) translateZ(350px);
        }

        .entity:nth-child(7) {
            transform: rotateY(216deg) translateZ(350px);
        }

        .entity:nth-child(8) {
            transform: rotateY(252deg) translateZ(350px);
        }

        .entity img {
            height: 100%;
            width: 100%;
        }

        .com-text {
            display: flex;
            justify-content: center;
            font-size: 25px;
            margin-top: 40px;
        }

        /* Our Works */
        .carousel {
            /* border:5px solid black; */
            overflow-x: auto;
            display: flex;
            gap: 20px;
            margin-top: 300px;
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }

        @keyframes slide {
            from {
                translate: 0;
            }

            to {
                translate: -100%;
            }
        }

        .carousel:hover .group {
            animation-play-state: paused;
            cursor: pointer;
        }

        .group {
            display: flex;
            animation: slide 15s infinite linear;
            gap: 20px;
        }

        .group img {
            height: 100%;
            width: 100%;
        }

        .item {
            height: 300px;
            width: 300px;
            background-color: rgb(212, 238, 229);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }
    </style>
</head>
