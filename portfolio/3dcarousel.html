<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
        }

        .body {
            height: 100vh;
            display: flex;
        }
        .carousel-3D{
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            height: 100%;
            width: 100%;
            transform-style: preserve-3d;
            animation: rotation 10s infinite linear;
        }   
        @keyframes rotation {
            from{
                transform: rotateY(0deg);
            }
            to{
                transform: rotateY(360deg)
            }
        }

        .item {
            height: 75px;
            width: 75px;
            border-radius: 75px;
            border: transparent;
            display: block;
            position: absolute;
        }
        .item:nth-child(1){
            transform: rotateY(0deg) translateZ(350px);
        }
        .item:nth-child(2){
            transform: rotateY(36deg) translateZ(350px);
        }
        .item:nth-child(3){
            transform: rotateY(72deg) translateZ(350px);
        }
        .item:nth-child(4){
            transform: rotateY(108deg) translateZ(350px);
        }
        .item:nth-child(5){
            transform: rotateY(144deg) translateZ(350px);
        }
        .item:nth-child(6){
            transform: rotateY(180deg) translateZ(350px);
        }
        .item:nth-child(7){
            transform: rotateY(216deg) translateZ(350px);
        }
        .item:nth-child(8){
            transform: rotateY(252deg) translateZ(350px);
        }
        .item img{
            height: 100%;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="carousel-3D">
            <div class="item"><img src="google.jpg" alt="" class="google"></div>
            <div class="item"><img src="amazon.png" alt=""></div>
            <div class="item"><img src="apple.png" alt=""></div>
            <div class="item"><img src="meta.png" alt=""></div>
            <div class="item"><img src="netflix.jpg" alt=""></div>
            <div class="item"><img src="nvidia.jpg" alt=""></div>
            <div class="item"><img src="adobe.png" alt=""></div>
            <div class="item"><img src="asus.png" alt=""></div>
        </div>
    </div>
</body>

</html>
