<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sidebar</title>

<style>
*{
    margin:0;
}

.Sidebar{
    height:400px;
    width:150px;
    background:black;
    transform:translateX(-150px);
    transition:0.3s ease;
}
</style>

</head>
<body>

<nav>
    <div class="Sidebar" id="Sidebar"></div>
    <button onclick="openSidebar()">Click Me</button>
</nav>

<script>

let Sidebaropen = false;

function openSidebar(){

    if(Sidebaropen == false){

        document.getElementById("Sidebar").style.transform = "translateX(0px)";
        Sidebaropen = true;

    }
    else{

        document.getElementById("Sidebar").style.transform = "translateX(-150px)";
        Sidebaropen = false;

    }

}

</script>

</body>
</html>
